<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 白地図背景 -->
  <rect width="32" height="32" fill="#f7f5f0"/>

  <!-- クロス型の訪問済みメッシュ（サーモンピンク） -->
  <!-- 上セル・中段フル幅・下左2列 -->
  <path d="M10,0 L21,0 L21,9 L32,9 L32,18 L21,18 L21,27 L0,27 L0,9 L10,9 Z"
        fill="#e74c3c" opacity="0.38"/>

  <!-- 上部の境界線（埼玉・東京境界付近のイメージ） -->
  <path d="M0,6 Q5,3 10,7 Q14,9 18,6 L32,7"
        stroke="#3a1e0e" stroke-width="1.1" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 上部右側の境界線 -->
  <path d="M22,2 Q27,0 32,3"
        stroke="#4a2e1e" stroke-width="0.9" fill="none" stroke-linecap="round"/>

  <!-- 中央の複雑な境界（東京湾岸・区境のイメージ、ギザギザ部は直線で代用） -->
  <path d="M17,10 L17,13 Q18,15 16,16 L15,18 Q13,20 16,21 Q18,22 17,25"
        stroke="#3a1e0e" stroke-width="1" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 左下の境界線（神奈川方面） -->
  <path d="M0,21 Q4,18 6,22 Q8,26 6,28"
        stroke="#4a2e1e" stroke-width="0.9" fill="none" stroke-linecap="round"/>
</svg>
