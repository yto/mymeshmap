<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 背景（地図の陸地色） -->
  <rect width="32" height="32" rx="3" fill="#dce8c0"/>

  <!-- 地図っぽい薄いテクスチャ（海のような淡い青） -->
  <rect x="0" y="18" width="10" height="14" rx="2" fill="#b8d4e8" opacity="0.5"/>
  <rect x="22" y="0" width="10" height="10" rx="2" fill="#b8d4e8" opacity="0.4"/>

  <!-- メッシュグリッド縦線 -->
  <line x1="8"  y1="0"  x2="8"  y2="32" stroke="#8a9a6a" stroke-width="0.6"/>
  <line x1="16" y1="0"  x2="16" y2="32" stroke="#8a9a6a" stroke-width="0.6"/>
  <line x1="24" y1="0"  x2="24" y2="32" stroke="#8a9a6a" stroke-width="0.6"/>

  <!-- メッシュグリッド横線 -->
  <line x1="0"  y1="8"  x2="32" y2="8"  stroke="#8a9a6a" stroke-width="0.6"/>
  <line x1="0"  y1="16" x2="32" y2="16" stroke="#8a9a6a" stroke-width="0.6"/>
  <line x1="0"  y1="24" x2="32" y2="24" stroke="#8a9a6a" stroke-width="0.6"/>

  <!-- 訪問済みメッシュ（赤） -->
  <rect x="8"  y="8"  width="8" height="8" fill="#e74c3c" opacity="0.75"/>
  <rect x="16" y="8"  width="8" height="8" fill="#e74c3c" opacity="0.75"/>
  <rect x="8"  y="16" width="8" height="8" fill="#e74c3c" opacity="0.75"/>
  <rect x="24" y="16" width="8" height="8" fill="#e74c3c" opacity="0.75"/>
  <rect x="16" y="24" width="8" height="8" fill="#e74c3c" opacity="0.75"/>
</svg>
